apiVersion: apps/v1
kind: Deployment
metadata:
  name: buyflow-frontend
  namespace: buyflow
  labels:
    app: buyflow-frontend
    app.kubernetes.io/name: buyflow-frontend
    app.kubernetes.io/part-of: buyflow
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: buyflow-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: buyflow-frontend
        app.kubernetes.io/name: buyflow-frontend
        app.kubernetes.io/part-of: buyflow

    spec:
      imagePullSecrets:
        - name: ocir-secret

    spec:
      nodeSelector:
        kubernetes.io/arch: arm64

      imagePullSecrets:
        - name: ocir-secret

      containers:
        - name: buyflow-frontend
          image: yny.ocir.io/ax0caghpplpc/buyflow-frontend:20260627121655
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
