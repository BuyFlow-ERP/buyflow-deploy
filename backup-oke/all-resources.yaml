          kill -TERM "$OTEL_PID" 2>/dev/null || true
          wait "$OTEL_PID"
          exit 0
        }

        trap 'shutdown' TERM INT

        /otelcontribcol --config /etc/otelcol-contrib/config.yaml &
        OTEL_PID=$!
        echo "OTel started with PID $OTEL_PID"

        while kill -0 "$OTEL_PID" 2>/dev/null; do
          if [ -f "$RELOAD_FILE" ]; then
            echo "[Config Reloader]Reload signal file detected. Sending SIGHUP to OTel..."
            rm -f "$RELOAD_FILE"
            kill -HUP "$OTEL_PID" 2>/dev/null || true
          fi

          sleep 10 &
          wait $!
